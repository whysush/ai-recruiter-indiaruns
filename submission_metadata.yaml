# ============================================================================
# AI tools declaration (transparency only; not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) as a pair-engineer for architecture discussion, code
  scaffolding, and code review. All design decisions, the scoring model, the
  honeypot audit rules, and the JD decomposition were human-directed and reviewed.
  No candidate data was sent to any hosted LLM, and no LLM is called anywhere in
  the scored ranking path.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Structured-evidence ranker with one genuine semantic component, unified so the
  demo IS the submission pipeline. final_score = (0.40*semantic_fit +
  0.60*evidence_fit) * behavioral_envelope * location_shaper - honeypot_penalty.
  semantic_fit is cosine similarity between a JD-derived ideal-profile text and each
  candidate's combined text, using a local sentence-transformers model precomputed
  and cached to a numpy artifact (the timed ranking step is numpy-only, CPU,
  no-network). evidence_fit combines title relevance, duration-weighted career
  relevance, and skill evidence validated by measured skill_assessment_scores — the
  data shows listed skills are near-uniform noise, so we trust assessments and
  career descriptions, not keyword lists. A 9-rule honeypot/consistency audit sinks
  impossible profiles, keyword stuffers, CV/speech-without-NLP, consulting-only
  careers, and aspirational "transitioning-into-ML" false positives. Behavioral
  signals act as a bounded [0.5,1.2] availability multiplier, never the main driver.
  Reasoning is generated deterministically from each candidate's own numbers.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
